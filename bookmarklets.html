<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>scrolloier bookmarklets</title>
<style>
body { font: 16px/1.6 sans-serif; max-width: 480px; margin: 4em auto; padding: 0 1em; color: #222; }
h1 { font-size: 1.1em; margin-bottom: 1.5em; }
p { margin: 0 0 .5em; color: #555; font-size: .9em; }
a.bookmarklet {
    display: inline-block;
    background: #e8a020;
    color: #000;
    font-weight: bold;
    padding: .6em 1.2em;
    border-radius: .3em;
    text-decoration: none;
    margin: .25em 0 1.5em;
    cursor: grab;
}
</style>
</head>
<body>
<h1>scrolloier bookmarklets</h1>

<p>Drag to your bookmarks bar. Click while on any page to post it silently.</p>

<p><strong>scott</strong></p>
<a class="bookmarklet" href="javascript:(function(){var d=new FormData();d.append('url',location.href);d.append('title',document.title);d.append('user','scott');d.append('submittedPost','1');d.append('_ajax','1');fetch('https://oloier.com/share/',{method:'POST',body:d}).then(function(r){return r.json();}).then(function(res){var t=document.createElement('div');t.textContent=res.ok?'posted ✓':'failed ✗';t.style.cssText='position:fixed;top:1em;right:1em;z-index:99999;background:'+(res.ok?'#e8a020':'#c0392b')+';color:#000;font:bold 14px/1 sans-serif;padding:.75em 1.25em;border-radius:.3em;box-shadow:0 2px 8px rgba(0,0,0,.3);';document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}).catch(function(){alert('post failed');});}());">+ scrolloier (scott)</a>

<p><strong>mike</strong></p>
<a class="bookmarklet" href="javascript:(function(){var d=new FormData();d.append('url',location.href);d.append('title',document.title);d.append('user','mike');d.append('submittedPost','1');d.append('_ajax','1');fetch('https://oloier.com/share/',{method:'POST',body:d}).then(function(r){return r.json();}).then(function(res){var t=document.createElement('div');t.textContent=res.ok?'posted ✓':'failed ✗';t.style.cssText='position:fixed;top:1em;right:1em;z-index:99999;background:'+(res.ok?'#e8a020':'#c0392b')+';color:#000;font:bold 14px/1 sans-serif;padding:.75em 1.25em;border-radius:.3em;box-shadow:0 2px 8px rgba(0,0,0,.3);';document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}).catch(function(){alert('post failed');});}());">+ scrolloier (mike)</a>

</body>
</html>
